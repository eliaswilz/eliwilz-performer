<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 453" fill="none">
  <!-- Background -->
  <rect width="340" height="453" fill="#161616"/>

  <!-- Stage spotlight glow -->
  <ellipse cx="170" cy="420" rx="90" ry="18" fill="#1e1e1e"/>

  <!-- Body -->
  <line x1="170" y1="220" x2="170" y2="340" stroke="#e0e0e0" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Left arm holding mic stand -->
  <line x1="170" y1="240" x2="140" y2="280" stroke="#e0e0e0" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Right arm gesturing out -->
  <line x1="170" y1="240" x2="210" y2="265" stroke="#e0e0e0" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Legs -->
  <line x1="170" y1="340" x2="150" y2="400" stroke="#e0e0e0" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="170" y1="340" x2="190" y2="400" stroke="#e0e0e0" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Head -->
  <circle cx="170" cy="195" r="26" stroke="#e0e0e0" stroke-width="2" fill="none"/>

  <!-- Mic stand pole -->
  <line x1="140" y1="280" x2="140" y2="400" stroke="#e0e0e0" stroke-width="2" stroke-linecap="round"/>
  <!-- Mic stand base -->
  <line x1="120" y1="400" x2="160" y2="400" stroke="#e0e0e0" stroke-width="2" stroke-linecap="round"/>
  <!-- Microphone head -->
  <ellipse cx="140" cy="272" rx="8" ry="11" stroke="#e0e0e0" stroke-width="1.8" fill="none"/>

  <!-- Label -->
  <text x="170" y="440" text-anchor="middle" font-family="'Courier New', monospace" font-size="11" fill="#555" letter-spacing="3">YOUR PHOTO HERE</text>
</svg>
