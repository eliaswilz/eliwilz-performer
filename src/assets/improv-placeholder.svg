<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 453" fill="none">
  <!-- Background -->
  <rect width="340" height="453" fill="#161616"/>

  <!-- Stage spotlight glow -->
  <ellipse cx="170" cy="420" rx="100" ry="18" fill="#1e1e1e"/>

  <!-- ── Figure Left ── -->
  <!-- Head -->
  <circle cx="130" cy="185" r="24" stroke="#e0e0e0" stroke-width="2" fill="none"/>
  <!-- Body -->
  <line x1="130" y1="209" x2="130" y2="330" stroke="#e0e0e0" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Left arm down -->
  <line x1="130" y1="235" x2="108" y2="275" stroke="#e0e0e0" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Right arm reaching toward other figure -->
  <line x1="130" y1="235" x2="165" y2="255" stroke="#e0e0e0" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Legs -->
  <line x1="130" y1="330" x2="112" y2="395" stroke="#e0e0e0" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="130" y1="330" x2="148" y2="395" stroke="#e0e0e0" stroke-width="2.5" stroke-linecap="round"/>

  <!-- ── Figure Right ── -->
  <!-- Head -->
  <circle cx="215" cy="185" r="24" stroke="#e0e0e0" stroke-width="2" fill="none"/>
  <!-- Body -->
  <line x1="215" y1="209" x2="215" y2="330" stroke="#e0e0e0" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Left arm reaching toward other figure -->
  <line x1="215" y1="235" x2="178" y2="255" stroke="#e0e0e0" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Right arm raised expressively -->
  <line x1="215" y1="235" x2="240" y2="210" stroke="#e0e0e0" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Legs -->
  <line x1="215" y1="330" x2="197" y2="395" stroke="#e0e0e0" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="215" y1="330" x2="233" y2="395" stroke="#e0e0e0" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Connecting hands spark -->
  <circle cx="171" cy="255" r="4" stroke="#e0e0e0" stroke-width="1.5" fill="none"/>

  <!-- Label -->
  <text x="170" y="440" text-anchor="middle" font-family="'Courier New', monospace" font-size="11" fill="#555" letter-spacing="3">YOUR PHOTO HERE</text>
</svg>
